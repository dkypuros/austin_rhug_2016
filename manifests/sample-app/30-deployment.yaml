apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-chat-backend
  namespace: composer-ai-apps-demo
  labels:
    app.kubernetes.io/name: sample-chat
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-chat
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-chat
        app.kubernetes.io/component: backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: sample-chat-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: OPENAI_DEFAULT_URL
              valueFrom:
                configMapKeyRef:
                  name: sample-chat-config
                  key: OPENAI_DEFAULT_URL
            - name: OPENAI_DEFAULT_MODELNAME
              valueFrom:
                configMapKeyRef:
                  name: sample-chat-config
                  key: OPENAI_DEFAULT_MODELNAME
            - name: OPENAI_DEFAULT_APIKEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: apiKey
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-chat-frontend
  namespace: composer-ai-apps-demo
  labels:
    app.kubernetes.io/name: sample-chat
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-chat
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-chat
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: sample-chat-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: sample-chat-config
                  key: BACKEND_URL
            - name: NEXT_PUBLIC_APP_TITLE
              valueFrom:
                configMapKeyRef:
                  name: sample-chat-config
                  key: NEXT_PUBLIC_APP_TITLE
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
