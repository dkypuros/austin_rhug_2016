apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 00-namespace.yaml
  - 10-configmap-code.yaml
  - 30-deployment.yaml
  - 40-service-route.yaml
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: sample-chat
      app.kubernetes.io/part-of: austin-rhug-2026-demo
images:
  - name: sample-chat-backend
    newName: image-registry.openshift-image-registry.svc:5000/composer-ai-apps-demo/sample-chat-backend
    newTag: latest
  - name: sample-chat-frontend
    newName: image-registry.openshift-image-registry.svc:5000/composer-ai-apps-demo/sample-chat-frontend
    newTag: latest
